name: flake-check

on:
  pull_request:

permissions:
  contents: read

jobs:
  nix-check:
    name: nix-check
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: nix flake check
        run: nix flake check --print-build-logs --no-update-lock-file --no-build
